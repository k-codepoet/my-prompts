notes: |
  사용자 진단 (2026-05-02 13:10 KST):
  > "자국 새벽이 뭐하는거지? Terrain은 사람이 사는 지형의 형태가 되야하는데
  >  뭔지 알 수 없는 용어들의 나열임. terrain은 사람 사는 지형으로 묘사하고
  >  항목들 구체화한 다음 인물에게 할당해야 할거같아."

  진단 1 — 어휘 혼탁:
  - "자국 새벽" 이라는 단어는 코퍼스 grep 0건. 사용자는 *손금 새벽* (193회) 과
    *자국빛* (345회) 를 한 추상 단어로 뭉쳐 들었다.
  - 손금/자국/자국빛/새벽/결/흙/박힘/자리 등 세계관 단어가 너무 비슷한 추상층에서 떠다녀
    독자가 어느 게 시간(손금 새벽 = 매일 30분), 어느 게 시각(자국빛 = 비치는 빛),
    어느 게 행위(박음), 어느 게 사물(흙) 인지 분리 못 한다.
  - reader-first-standard.md 의 toxic-term budget 위반 패턴 1 호 신규 사례.

  진단 2 — terrain 이 사람 사는 지형이 아님:
  - terrain-v0 의 5종 (사랑의 산 / 일의 산 / 후회의 산 / 기다림의 산 / 통과의 산) 은
    *흙의 진하기 × 방향* 의 추상 분류표다. 실제 산골·들녘·강가·포구·구릉이 아님.
  - regions-v0 의 5지역 (침대 박차 / 음습한 길 / 의지소 / 도착-아닌-여정 / 자국빛) 도
    *상태/심리* 이름이지 *공간/마을/거주지* 가 아님.
  - 8인물 (해온/정해/나림/유경/인규/연강/희재/유리) 누구도 *어느 마을·동네·풍경* 에 사는지
    안 박혀 있다. 모두 *추상 자리* 만 있고 *물리 좌표* 가 0.

  처치 방향 (사용자 직접 발의):
  1. (loremaster) terrain v1.0 신규 — 사람이 실제로 사는 지형 카테고리로 재구축.
     예: 산골 / 들녘 / 강가 / 포구·바닷가 / 구릉 / 분지 / 도시 변두리 / 도시 한복판 등.
     기존 5종 추상 산은 *흙 분류 보조 축* 으로 격하 (지형 위에 어떤 산이 굳어 있는가의 변주).
  2. (loremaster) regions v1.0 — 추상 상태 이름이 아니라 실제 권역 이름 (지역명).
     각 권역의 풍경·기후·주거 형태·일상 박자 한 단락씩.
  3. (writer + loremaster) 8인물 거주지 할당 — 각 인물의 frontmatter 또는 시트에
     `region: <지역명>` + `terrain: <지형 카테고리>` + 일상 풍경 1 단락. character-sheets-v0
     8자리 모두 패치.
  4. (writer) 회차 본문 안 *어디인지* 단서 박음 — 지금까지 단편들은 인물의 내면만
     비춰서 *어느 풍경에서 그 새벽이 일어났는지* 가 0. 한 회차에 풍경 단서 1~2 줄 박음 의무.
  5. (art-director) visual-bible §지형 갱신 — 추상 산 외형 룰 위에 실제 지형 (산골/강가/포구) 의
     시각 룰 한 단락씩.
  6. (critic) cold-read 5분 측정에 *공간감 (어느 풍경인지)* 항목 신규 — 기존 §7 5항목 위에 1자리 후보.
  7. (loremaster) 어휘 정리 — 손금 새벽 / 자국빛 / 손금 / 자국 / 박음 / 결 / 흙 의 *층위 분리표*
    1 페이지 박음. 독자가 한 단어씩 어느 층위 (시간/행위/사물/시각/심리) 인지 1초 안에 알 수 있게.

  본 피드백은 cy-003 안 처치할 큰 산출물이다 — loremaster terrain v1.0 + regions v1.0 +
  writer 8인물 거주지 패치 + art-director visual-bible 갱신 + critic 5분 측정 항목 신규.
