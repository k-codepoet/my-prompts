    = 4 회 이후 자동으로 새 회차가 안 써지고 있다 사용자 R0 fail.

  처치 후보:
  - a (skip-frozen-only): designer (frozen) 만 회전에서 제외. scope-reduced (art-
    director / implementer) 는 회전 유지 (단편 일러스트 / publishing surface
    영역 안 활성).
  - b (skip-frozen-and-scope-reduced): frozen + scope-reduced 모두 회전에서 제외.
    회전 풀 = orchestrator + loremaster + writer + voice-keeper + critic = 5 자리.
