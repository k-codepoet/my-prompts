title: "cy-001 vertical slice 1 종 표적 — 게임 vs 이미지 vs 단편 (the-map-walker / 6 우표 / 자기 지도 본 새벽)"

description: |
  cy-001 의 G-PRODUCT-1 1 호 표적 결정. bible v0.2 §7 의 세 vertical slice 후보
  (게임 / 단편 / 이미지) 중 *cy-001 안에 1 차 도착할 1 종* 을 박는다.

  본 결정은 critic r2 (전달 게이트 6/6 통과) + voice-keeper r2 (정렬 게이트
  9.06/10 통과) 두 도구의 *G-WORLD-1 진입 장벽 게이트 1 차 통과* 직후 발의.
  세 후보 모두 charter 챔피언 영역 안에서 통과 가능 (Type A 아님), 비전·시드·
  G-* 영향 0 (Type C 아님) — 두 옵션 이상 가치 판단 자리이므로 Type B.

  점수 매트릭스 (critic r2 §3 + voice-keeper r2 §C.2 가산점 흡수):
  - 게임 (the-map-walker)            : 26 / 30  (매니페스토 6/7, 진입 9, 즉답 9, 외부 8)
  - 이미지 (6 명 6 우표)             : 25 + 2 = 27 / 30  (세 축 직접 해소 +2)
  - 단편 (자기 지도 본 새벽)         : 21 / 30

  점수 우위만 보면 *이미지* — 세 축 부재 임계 (voice-keeper r2 §C.2) 직접 해소
  가산점 +2 가 결정적. 그러나 *cy-001 의 결로* 차원의 가치 판단:
  - 매니페스토 동시 박는 키워드 6 / 7 (게임) vs 4 / 7 (이미지·단편)
  - implementer r1 manual-run-checklist v0 가 게임 후보에만 도착 — *Iron Law
    수동 검증* 의 1 차 도구 묶음
  - cy-001 *세 축* 임계 해소가 vertical slice 1 호로 가야 하는가, 별도 task 로
    가야 하는가 (writer r2 가족·업 인물 시트 또는 cy-002 r1 흡수)

  세 자리 모두 다른 vertical slice 의 1 호 → cy-002 r1 의 2 호 짝이 자연
  스럽게 박힘. 본 결정은 *어느 결을 cy-001 안에서 가장 깊게 시연하는가* 의
  가치 판단.

options:
  - id: game
    summary: "게임 — *the-map-walker* (Web / Pixi.js 산책 시뮬 vertical slice)"
    cost: |
      셋업 0.5 일 (engine-choice 통과). 1 일 vertical slice budget 안에 30 초
      빌드 도달 가능. designer r2 (다이얼로그 또는 메카닉 v0+) + implementer r2
      (1 차 prototype + manual-run) + art-director r2 (시각 바이블 v0.2) 3 조직
      r2 동시 묶음. 빌드 산출 = URL 1 개 (cold reader 마찰 1 차 최소).
    supporters: [critic, designer, implementer]
    objectors: []
    fits_champions: |
      - critic §진입 장벽: URL 1 개 = 클릭 1 회. 진입 9 / 10 — 3 후보 중 2 위 (이미지 10 다음).
      - critic §즉답 가능성: "걷는 만큼 그려진다 + 남의 흙 색조 + 쉼의 자리 한 점" 30 초 시각화. 9 / 10 — 3 후보 중 1 위.
      - critic §외부 시선: implementer r1 manual-run-checklist v0 의 5 항 객관 임계 도구가 본 후보에만 도착. 8 / 10.
      - voice-keeper §매니페스토 동시 박음: 6 / 7 키워드 (움직임 + 연대 + 축복 + 진심 + 시간이 곧 나 + 방향). 3 후보 중 1 위.
      - voice-keeper §세 축: *나* 축 단일 1 인칭 — 가산점 0. cy-001 후반 또는 cy-002 r1 의 *가족 / 업 축 인물 시트* (writer r2/r3) 가 별도로 응답해야 함.
      - implementer §자립: OSS 전체 (Pixi.js + WebGL2 + Vite + TS).
      - 합계: **26 / 30**.

  - id: image
    summary: "이미지 — 6 명 6 우표 시리즈 (각자의 첫 자국 1 점, 1 점은 *쉼의 자리* 만)"
    cost: |
      셋업 0 일 (visual bible v0.1 통과). 1 일 budget 안에 6 장 cold reader 도달.
      art-director r2 (시각 바이블 v0.2 — 6 우표 인물 외형 + 색조) + loremaster
      r3 (6 인 1 줄 박기) 2 조직 r2/r3 묶음. 빌드 산출 = 6 PNG (cold reader
      마찰 0 — 즉시 보임).
    supporters: [art-director, voice-keeper]   # voice-keeper §C.2 세 축 직접 해소 자리
    objectors: []
    fits_champions: |
      - critic §진입 장벽: 즉시 보임. 10 / 10 — 3 후보 중 1 위.
      - critic §즉답 가능성: 1 장씩 보면 *방향 + 진심 + 축복* 의 결이 옅음. 6 장 합계가 *연대* 결의 1 차 시각화. 6 / 10 — 3 후보 중 3 위.
      - critic §외부 시선: art-director r1 visual bible v0.1 통과 + 6 인 = *세 축 분배 가능* 자리 1 호. 9 / 10.
      - voice-keeper §매니페스토 동시 박음: 4 / 7 키워드 (방향 + 진심 + 축복 + 연대).
      - voice-keeper §세 축: **6 인 = 가족 1 + 업 1 + 나 4 또는 다른 분배 가능** — *세 축 부재* 임계 직접 해소 1 호 자리. **+2 가산점**.
      - 합계: **25 + 2 = 27 / 30**.

  - id: short_story
    summary: "단편 — *처음으로 자기 지도를 본 새벽* (1500–2500 자, 1 인칭 = 해온 또는 나림)"
    cost: |
      셋업 0 일 (character-sheets v0 통과). 1 일 budget 안에 1500–2500 자 도달.
      writer r2 단일 조직 task. 빌드 산출 = MD 1 개 (cold reader 마찰 1 — 5–8 분
      읽기 인내).
    supporters: [writer]
    objectors: []
    fits_champions: |
      - critic §진입 장벽: 5–8 분 읽기. 6 / 10 — 3 후보 중 2 위 (게임 9 다음).
      - critic §즉답 가능성: *손바닥에 비친 지도 + 떨림 + 작음의 무게* — *자립 + 시간이 곧 나 + 축복* 동시 박힘. 8 / 10. 단 *연대* 결 약함 (1 인칭 단일).
      - critic §외부 시선: writer r1 character-sheets v0 통과 + voice-keeper 8.56 통과. 7 / 10.
      - voice-keeper §매니페스토 동시 박음: 4 / 7 키워드 (자립 + 시간이 곧 나 + 축복 + 진심).
      - voice-keeper §세 축: *나* 축 1 인칭 단일 — 가산점 0.
      - 합계: **21 / 30**.

recommended: game
recommended_reason: |
  점수 매트릭스 합계만 보면 *이미지* (27 / 30) 가 1 위이나 — 그 우세는 voice-
  keeper r2 §C.2 *세 축 부재* 임계 직접 해소 가산점 +2 에서 옴. 본 가산점 자리
  는 vertical slice 1 호 *안에서만* 해소 가능한 게 아니라 별도 task (writer r2
  *가족 / 업 축 인물 시트*) 로도 *직접* 응답 가능 — 즉 vertical slice 표적과
  분리해서 박을 수 있다.

  반대로 *매니페스토 동시 박는 키워드 6 / 7* + *implementer r1 manual-run-
  checklist v0 도구 도착* 두 자리는 *게임 후보에서만* 가능한 결 일치. cy-001
  의 *bible v0.2 가 vertical slice 의 출처* 라는 결을 가장 깊게 시연하는 후보.

  결정 권고:
  - **picked = game**: 게임 1 호 vertical slice 도착 + writer r2 *가족 / 업 축
    인물 시트* 분리 task 로 *세 축* 임계 직접 해소 (cy-001 후반 또는 cy-002 r1).
    점수 합계 차이 (-1) 는 *분리된 응답* 으로 보강.
  - **picked = image**: vertical slice 1 호 안에서 *세 축* 임계 직접 해소.
    *연대 + 방향 + 축복 + 진심* 4 키워드 시각화. 단 *움직임* 의 결 (= 본 세계의
    1 자연법칙) 이 정지 이미지에서 시각화 약함 — 별도 게임 task 로 cy-002 r1 에
    재진입 자연스러움.
  - **picked = short_story**: *손바닥에 비친 지도* 의 가장 깊은 시연. 단 cold
    reader 진입 마찰 1 차 + *연대* 결 약함. cy-001 안 1 호로 박기에는 위험 +1.

  사용자 / orchestrator 차원 결정. 본 추천은 critic 영역 (*전달*) 의 매니페스토
  동시 박음 우위 + implementer 도구 도착 두 자리에 무게.

