  1. F-20260502-1216 — 글이 추상적, 손금/손바닥/자국 같은 세계관 단어가 사람 공감 안 옴.
  2. F-20260502-1310 — terrain 이 사람 사는 지형이 아님. 실제 지형 + 8 인물 거주지 할당 필요.
  3. F-20260503 (chat) — 자국강 같은 세계관 합성어 거부, 한국 지명 결.
  4. F-20260503 (chat) — 손바닥 보는 행위 다른 메타포 고민. 결정: *이름 떼고 행동만* (현관에서 신발 한 번).
  5. F-20260503 (chat) — 박기/박다/박음/박힘 거부. 결정: *적다* (시스템) + *남다* (흔적) 분리.
