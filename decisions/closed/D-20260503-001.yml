vocabulary_shift:
  손바닥/손금: 신발 (현관 신발 한 번)
  손금 새벽: (이름 폐기 — *매일 새벽 현관에서 신발 한 번 본다* 행동만)
  자국 (흔적 의미): 다녀온 자리 / 어제 다녀온 길 / 흔적 / 묻은 흙
  박다/박음 (시스템·기록): 적다
  박다/박힘 (단편 안 흔적): 남다
  결 (메타포): 평이화 — 결을 *느낌 / 결정 / 방식* 등 일상어로
  자리 (메타포): 평이화 — *자리* 는 그대로 두되 *~의 자리* 추상 합성 회피

region_mapping_v2:
  새벽재: 정선 (강원, 산골 한 줄 마을)
  옅은들: 김제 (전라, 만경평야)
  느릿내: 단양 (충북, 남한강 강변)
  마른포: 통영 (경남, 작은 포구)
  늘재: 무주 (전라, 분지)
  빽빽골: 성남 변두리 (인규 거주)

resident_mapping:
