description: |
  cy-001 cycle close 임계 도달 (마감 라운드 7/7 종결 + 정렬 측 측정 마감 +
  cycle close review.md 박음 + drift 13 호 회복) 직후 발의. 본 결정 = cy-002
  진입의 *4 자리 묶음* Type C:

    (a) cy-002 charter 박음 — 목적 (G-* 진척 표적), 조직 구성 유지/변경,
        사이클 길이 예측, 신규 결정 예측.
    (b) 진화 룰 정식 박음 — review.md §4.1 9 자리 (재재초과 강화) 정식 룰
        진입 + §4.2 6 자리 (도달) 도입 자리.
    (c) 7 조직 r1 task 큐 — review.md §5.2 7 자리.
    (d) writer r4 forbidden-dialogue-v0.md (cy-001 마감 라운드 7/7 종결
        후 박음, *cy-001 후반 task 큐 외부 자리* = orphan ack, tick-032)
        의 cy-001 vs cy-002 분류 — voice-keeper r4 audit 후 정식 흡수 결정.

  본 결정은 *조직 추가·병합·제거 0* + *역할 책임 영역 큰 변경 0* + *G-*
  목표·수렴 기준 미수정* + *불변 룰 미수정* + *시드 미변경* — 그러나 *진화
  룰 정식 박음* 은 *조직 charter 의 표준 룰 추가* = constitution §진화 규칙
  §사람 합의 필요 §"메타데이터 스키마 호환 깨지는 변경" 인접 자리 → 안전
  자리에서 Type C 박음.

  G-* baseline (review.md §2):
    G-WORLD-1   = 0.56  (정렬 9.59 + critic 24/24 + 8 문서 중 6 박음, 두 gen 안정 미충족)
    G-PRODUCT-1 = 0.30  (게임 prototype + 단편 1 + 이미지 컨셉 시트, 인터랙티브 보류 가중)
    G-LOOP-1    = 0.00  (cy-002 미시작)
    G-AUTONOMY-1= 0.85  (결정 큐 3 ≤ 10)
    G-CONVERGE-1= 0.00  (1 gen 만)
    전체        = min = 0.00

  cy-002 진척 표적 (review.md §5.1):
    G-WORLD-1   0.56 → 0.80+ (지역 + 오브젝트/아이템 2 자리 박음 = 8 핵심 문서 도달)
    G-PRODUCT-1 0.30 → 0.65+ (vertical slice 인터랙티브 round 통과 + 단편 +2 + 이미지 실측)
    G-LOOP-1    0.00 → 첫 측정 자리 도달

