    options_ref: options_orgs              # 옵션을 같은 yml 의 어떤 배열에서 끌어올지
    default_from: recommended.orgs_pattern
    required: true

  - key: world_picked
    label: "첫 가상 세계"
    type: radio_or_text                    # 라디오 1 택 OR 직접 작성 한 줄
    options_ref: options_world
    default_from: recommended.world_pick
    freeform_label: "직접 작성한 한 줄 — 비우면 위 라디오 선택 사용"
    required: true

  - key: notes
    label: "노트 (자유 코멘트 · 수정 요청 · 추가 제안)"
