category: stamp
caption: |
  우표 §17.3 — 나림 *박물관 12 색조*. 늘재 분지 자리에서 다른 결의 12 색조
  옅은 자국 패치를 멀리 두고, 자기 종이는 아직 비워 둔 채 가장자리에서 양 손 닫혀
  돌아선 한 새벽. terrain-visual-rules-v0 §2.6 분지 (구도 / 붓 결 / 농담 / 종이
  결 / 안개 / 인물 배치) 6 항 직접 인용 1 호 image baseline. 늘재 권역 색조
  변주 (#C8995A 두꺼운 흙 위) 1 호 시각 박음. F-20260502-1310 must_fix #5
  art-director 영역 spec → image 인계 자리 1 호.
prompt: |
  traditional Korean ink-and-wash painting (sumukhwa) on rice paper, painterly
  brushwork visible, ink wash texture, restrained sepia and dust-ochre palette.
  Composition: a small basin (분지) at dawn — two or three sides of the frame
  edged by softly built dark earthen ridges that surround a central flat ground,
  a small village quietly settled on the central plain, paper-grain laid along
  the central plain direction, the surrounding ridge brushwork in short top-down
  strokes (the basin walls) while the central plain reads in slow horizontal
  strokes (the inhabited rest), thick dawn mist sitting low across the central
  plain at about 0.4 paper-width depth (wet-on-wet wash), a faint clearing of
  paper-white sky between the ridges. Within the central plain, twelve very
  faint earth-color trace patches arranged at quiet distance like a small museum
  of marks left by others, each patch a slightly different muted earth tone
  (warm sepia, dust ochre, cool stone-grey, faint ash, pale clay) — the colors
  restrained, never bright. A Korean woman in her mid-twenties standing slightly
  turned three-quarters away from the viewer at the basin's central plain edge
  facing the twelve traces, both hands clasped softly together palms held closed
  never opened, gaze level toward the edge of her own still-empty paper not
  opening it, faint half-smile only at the corner of her lips with shoulders
  and eyes held still, light brown hair short or shoulder length neatly kept,
  faded warm grey-brown linen cardigan over a plain undertone shirt, soft cloth
  shoes. Dust-ochre dawn light #C8995A laid heavier across the thick basin
  earth (the 늘재 region tone), the woman's own cardigan kept cooler
  #7A6447 to #8B7355 so she reads cooler than the surrounding earth, dawn light
  indirect not direct sunrise. Restrained turned-aside composition with others'
  traces visible behind. Aspect framed slightly square for a postage-stamp
  feel. NOT photograph.
negative_prompt: |
  photorealistic, photograph, realistic skin texture, 3D render, CGI,
  hyperrealism, modern photograph, studio photo, glossy, plastic skin,
  duplicate face, identical features, same character repeated, twin brothers,
  young face, late twenties face, opened palms, palms spread, hands raised,
  bright saturated color patches, neon, rainbow, modern museum interior,
  gallery wall, picture frames, photographs on wall, second figure, two
  figures, companion, water reflection, ocean, river crossing, flat plain
  without surrounding ridges, mountain peak in foreground, isometric view,
  top-down view, aerial view
