self_check_terrain_visual_rules_v0_2_6:
  composition: pass — 분지 가장자리 산이 좌우 둘러쌈 + 가운데 평지 + 한 줄 마을 모임
  brush_direction: pass — 둘러싼 능선 짧은 위→아래 stroke + 가운데 평지 옆 흐름 stroke = 두 stroke 한 화면
  ink_density: pass — 진한 폭 ≈ 40% (능선 + 두꺼운 흙) / 옅은 폭 ≈ 40% (평지 흙 + 새벽 빛) / 종이 흰 폭 ≈ 20% (능선 사이 트인 하늘)
  paper_grain: pass — 가운데 평지 방향 결, 둘러싼 능선 자리에서 결 멈춤
  dawn_mist: conditional — 평지 위 안개 결 박힘. 단 *0.4 폭 두께* 베이스라인 대비 다소 옅음 (≈ 0.25 폭) → 차후 v2 후보 자리 (자가 발화 1 자리 = mist 강화 negative `thin mist` 박음 후보)
  figure_placement: pass — 가운데 평지 자리 인물 1 명 + 둘러싼 산을 향해 시선 (떠남 결 변주 — *옆자리 12 자국* 을 본인 자리에서 본 자리)
