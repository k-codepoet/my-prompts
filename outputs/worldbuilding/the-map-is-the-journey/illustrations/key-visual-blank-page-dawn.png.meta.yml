prompt: |
  A single small human figure standing alone on a vast white parchment landscape at dawn.
  Behind the figure, a faint trail of dark earth footprints stretches back into morning mist,
  deep and clear near the figure but fading to nothing in the distance. Ahead — pure empty
  white paper, untouched, radiant with first light. The horizon is soft and unmarked.
  Ethereal, contemplative, painterly. The world IS the parchment — soft fiber texture
  visible. Cinematic wide composition, gentle warm dawn glow on the white surface,
  atmospheric depth, sense of beginning and of the journey itself drawing the map.
  Style: ink-and-watercolor concept art, evocative, restrained palette of warm whites,
  soft amber dawn, deep earth-brown footprints. No text, no UI elements.
