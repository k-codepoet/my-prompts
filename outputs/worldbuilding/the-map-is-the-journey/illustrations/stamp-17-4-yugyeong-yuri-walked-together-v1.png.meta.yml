caption: |
  우표 §17.4 — 유경 + 유리 *함께 걸은 자리* (느릿내 강가 §2.3). 35 자국째 다시 펴는 어머니 손바닥 옆, 8 살 유리가 처음 펴는 손바닥. 두 손은 안 잡음 (yuri-v2 baseline 1:1 인용 — 부모-자식 색조 패밀리 #5C4A36 ↔ #C8995A). 강은 *물의 반사 0 + 자국빛 줄지어 굳음* 결 (terrain v1 §3 + bible v0.5 §6 1:1 인용). 강 위 안개 0.3 폭 두께 (terrain-visual-rules-v0 §2.3 baseline).
prompt: |
  traditional Korean ink-and-wash painting (sumukhwa) on rice paper, painterly brushwork visible, restrained sepia and dust-ochre palette, two figures at the bank of a slow river at first dawn in a small riverside village, a Korean woman in her late thirties (mother, 38) standing beside her eight-year-old Korean daughter (half the height of her mother), both walking quietly along the bank facing the river, both opening their palms gently in unison but their hands clearly NOT joined and never touching, the mother with calm late-thirties contemplative bearing palette around #5C4A36 dust-path-center tone with golden ochre warmth, the eight-year-old girl with whole-body smile (shoulders eyes mouth all moving together) palette around #C8995A trace-glow child-tone, parent-child color family side by side, the river crossing the composition as a single long horizontal stroke depicted not as reflective water but as pale trace-marks settling in rows along the river course (dust-ochre #C8995A trace-glow lined along the flow), a single row of riverside village rooftops parallel to the river on the far bank, low pale dawn mist hovering above the river surface 0.3 width thick (wet-on-wet ink wash), rice paper grain laid horizontally along the river flow, plain pale linen clothing on both figures, mother in plain pale linen long sleeves, daughter with shoulder-length hair tied simply and plain pale linen morning shirt, composition with figures small at the 1/3 line in the riverside village strip, river occupying the lower 60% as a long horizontal ink stroke, no reflective water, no water shine, the two faces clearly distinct adult woman versus eight-year-old child not twins not duplicates, NOT photograph
