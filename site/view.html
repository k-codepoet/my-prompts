<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>view — my-prompts</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><text y=%2213%22 font-size=%2214%22>📜</text></svg>">
<link rel="stylesheet" href="/index-styles.css" onerror="this.remove()">
<style>
  :root {
    --bg: #f7f4ee;
    --fg: #2b251c;
    --muted: #7a715f;
    --line: #e3dccd;
    --accent: #5C4A36;
    --warn: #a04f2a;
    --mono: ui-monospace, "SF Mono", Menlo, Monaco, "Cascadia Code", "Roboto Mono", monospace;
    --serif: "Iowan Old Style", "Apple Garamond", Georgia, "Times New Roman", serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
  body { font-family: var(--serif); font-size: 17px; line-height: 1.7; }
  .wrap { max-width: 760px; margin: 0 auto; padding: 28px 24px 80px; }
  a { color: var(--accent); }
  a:hover { color: var(--warn); }
  code, pre { font-family: var(--mono); font-size: 0.92em; }
  pre { background: #f0ebde; padding: 12px 14px; border-left: 3px solid var(--line); overflow-x: auto; }

  .topbar { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-bottom: 24px; padding-bottom: 12px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; gap: 16px; flex-wrap: wrap; align-items: center; }
  .topbar a { color: var(--muted); }
  .topbar .crumb { flex: 1; min-width: 0; overflow-wrap: anywhere; }
  .topbar .right { display: flex; gap: 12px; align-items: center; }
  .toggle-btn { font-family: var(--mono); font-size: 11px; color: var(--muted); background: transparent; border: 1px solid var(--line); padding: 3px 8px; cursor: pointer; border-radius: 2px; }
  .toggle-btn:hover { color: var(--accent); border-color: var(--accent); }
  .toggle-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .meta-banner { background: #f0ebde; border-left: 3px solid var(--muted); padding: 8px 14px; margin: 16px 0; font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .meta-banner.hidden { display: none; }
  #debug-section { display: none; }
  #debug-section.shown { display: block; }
  .section-divider { margin: 32px 0 0; padding-top: 16px; border-top: 2px dashed var(--line); }
  .section-divider .label { font-family: var(--mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }

  article h1 { font-size: 28px; margin: 24px 0 8px; }
  article h2 { font-size: 22px; margin: 28px 0 8px; padding-bottom: 4px; border-bottom: 1px solid var(--line); }
  article h3 { font-size: 18px; margin: 20px 0 4px; color: var(--accent); }
  article h4 { font-size: 16px; margin: 16px 0 4px; color: var(--accent); }
  article table { border-collapse: collapse; margin: 12px 0; max-width: 100%; display: block; overflow-x: auto; }
  article th, article td { border: 1px solid var(--line); padding: 6px 10px; }
  article th { background: #f0ebde; }
  article hr { border: none; border-top: 1px solid var(--line); margin: 24px 0; }
  article blockquote { border-left: 3px solid var(--line); padding: 4px 14px; color: var(--muted); margin: 12px 0; font-style: italic; }
  article ul, article ol { padding-left: 1.5em; }
  article li { margin: 4px 0; }
  article img { max-width: 100%; height: auto; }
  article details { margin: 12px 0; }
  article details summary { cursor: pointer; font-family: var(--mono); font-size: 13px; color: var(--accent); }

  .yaml { background: #f0ebde; padding: 14px 16px; border-left: 3px solid var(--accent); white-space: pre-wrap; font-family: var(--mono); font-size: 13px; line-height: 1.5; overflow-x: auto; }

  footer { margin-top: 60px; padding-top: 20px; border-top: 1px solid var(--line); font-family: var(--mono); font-size: 11px; color: var(--muted); }
</style>
<script src="https://cdn.jsdelivr.net/npm/marked@13.0.0/marked.min.js"></script>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <span class="crumb"><a href="/">← my-prompts</a> / <span id="crumb"></span></span>
    <div class="right">
      <button id="debug-toggle" class="toggle-btn" onclick="toggleDebug()">🔧 디버그 보기</button>
      <a id="raw-link" href="" target="_blank">raw ↗</a>
    </div>
  </div>
  <div class="meta-banner hidden" id="meta-banner">
    이 글에는 시스템 내부 메타 (frontmatter, audit 자기 검사, 진화 룰 후보 등) 가 숨겨져 있습니다. 우상단 <code>🔧 디버그 보기</code> 로 전체 펼침.
  </div>
  <article id="content">로딩…</article>
  <article id="debug-section">
    <div class="section-divider"><span class="label">— DEBUG: 시스템 내부 메타 —</span></div>
    <div id="debug-content"></div>
  </article>
  <footer><span id="meta"></span></footer>
</div>

<script>
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function stripFrontmatter(text) {
  if (!text.startsWith("---")) return { fm: null, body: text };
  const end = text.indexOf("\n---", 3);
  if (end < 0) return { fm: null, body: text };
  const rawFm = text.slice(3, end);
  const body = text.slice(end + 4).replace(/^\n+/, "");
  return { fm: rawFm, body };
}

// reader/debug 분리 — body 안에서 첫 번째 "내부 섹션" 마커를 찾아 그 앞을 reader 부분으로.
// 카논 마커 우선순위:
//   1. ## 메타 (cold reader 는 본 § 안 읽어도 됨)   ← 명시적 마커
//   2. cold reader 라는 표현이 들어간 ## 헤딩
//   3. ## 메타 — 또는 ## §메타 패턴
//   4. ## 트립와이어 자기 검사 / ## 트립 자기 검사 / ## 도메인 위반 검토 / ## v0 → v0+ 보강 큐
function splitReaderDebug(body) {
  const lines = body.split("\n");
  const internalHeadings = [
    /^##\s+메타\s*\(.*cold reader.*\)/i,
    /^##\s+.*cold reader.*안.*읽/i,
    /^##\s+메타\b/,
    /^##\s+§?메타\b/,
    /^##\s+트립\s*와이어?\s*자기?\s*검사/,
    /^##\s+도메인\s+위반/,
    /^##\s+v0\s*[→\-]\s*v0\+\s*보강/,
    /^##\s+§?\d+\.\s*진화\s*룰\s*후보/,
  ];
  for (let i = 0; i < lines.length; i++) {
    if (internalHeadings.some(re => re.test(lines[i]))) {
      const reader = lines.slice(0, i).join("\n").replace(/\n+$/, "");
      const debug = lines.slice(i).join("\n");
      return { reader, debug, splitAt: i };
    }
  }
  return { reader: body, debug: "", splitAt: -1 };
}

// marked 결과 본문의 상대경로 img/a 를 md 파일 기준으로 절대경로 보정.
// view.html 은 root 에 있어 상대경로가 root 기준으로 풀려 깨짐 (예: 인물 md 의 ../../../worldbuilding/...).
function resolveRelativeRefs(html, mdPath) {
  const dir = mdPath.slice(0, mdPath.lastIndexOf("/") + 1); // "/outputs/writing/.../characters/"
  const tmp = document.createElement("div");
  tmp.innerHTML = html;
  const fix = (el, attr) => {
    const v = el.getAttribute(attr);
    if (!v) return;
    if (/^(?:[a-z]+:|\/\/|#|\/)/i.test(v)) return; // absolute / scheme / fragment / anchor 만은 패스
    try {
      const u = new URL(v, "http://_local" + dir);
      el.setAttribute(attr, u.pathname + u.search + u.hash);
    } catch (e) { /* leave as-is */ }
  };
  tmp.querySelectorAll("img[src]").forEach(el => fix(el, "src"));
  return tmp.innerHTML;
}

function toggleDebug() {
  const sec = document.getElementById("debug-section");
  const btn = document.getElementById("debug-toggle");
  const banner = document.getElementById("meta-banner");
  const fmBlock = document.getElementById("frontmatter-block");
  const open = !sec.classList.contains("shown");
  sec.classList.toggle("shown", open);
  btn.classList.toggle("active", open);
  btn.textContent = open ? "📖 reader 보기" : "🔧 디버그 보기";
  if (banner) banner.classList.toggle("hidden", open);
  if (fmBlock) fmBlock.style.display = open ? "block" : "none";
  // remember preference
  try { localStorage.setItem("view-debug", open ? "1" : "0"); } catch (e) {}
}

async function main() {
  const params = new URLSearchParams(location.search);
  const path = params.get("path");
  if (!path) {
    document.getElementById("content").textContent = "path 파라미터가 없습니다.";
    return;
  }
  // 보안: 절대경로/.. 금지
  if (path.startsWith("/") || path.includes("..")) {
    document.getElementById("content").textContent = "잘못된 경로.";
    return;
  }
  document.getElementById("crumb").textContent = path;
  document.getElementById("raw-link").href = "/" + path;
  document.title = path.split("/").pop() + " — my-prompts";

  const r = await fetch("/" + path, { cache: "no-store" });
  if (!r.ok) {
    document.getElementById("content").innerHTML =
      `<div style="color:var(--warn);font-family:var(--mono)">${r.status} — ${path} 로딩 실패</div>`;
    return;
  }
  const text = await r.text();
  const isYaml = path.endsWith(".yml") || path.endsWith(".yaml");
  const isMd = path.endsWith(".md");

  let readerHtml = "";
  let debugHtml = "";
  let hasDebug = false;
  if (isYaml) {
    debugHtml = `<pre class="yaml">${escapeHtml(text)}</pre>`;
    readerHtml = `<div style="color:var(--muted);font-family:var(--mono);font-size:13px">YAML 파일 — 디버그 보기로 전환하세요.</div>`;
    hasDebug = true;
  } else if (isMd) {
    marked.setOptions({ breaks: false, gfm: true });
    const { fm, body } = stripFrontmatter(text);
    const { reader, debug, splitAt } = splitReaderDebug(body);
    readerHtml = marked.parse(reader || "_(reader 부분 비어있음)_");
    if (fm) {
      const fmBlock = `<div id="frontmatter-block" style="display:none"><details open><summary>frontmatter</summary><pre class="yaml">${escapeHtml(fm)}</pre></details></div>`;
      debugHtml += fmBlock;
    }
    if (debug) {
      debugHtml += marked.parse(debug);
      hasDebug = true;
    } else if (fm) {
      hasDebug = true;
    }
  } else {
    readerHtml = `<pre>${escapeHtml(text)}</pre>`;
  }
  // 본문 안 상대경로 img 보정 (md 파일 기준)
  const mdAbsPath = "/" + path;
  readerHtml = resolveRelativeRefs(readerHtml, mdAbsPath);
  debugHtml = resolveRelativeRefs(debugHtml, mdAbsPath);
  document.getElementById("content").innerHTML = readerHtml;
  document.getElementById("debug-content").innerHTML = debugHtml;
  document.getElementById("meta").textContent = `${path} · ${text.length.toLocaleString()} bytes`;

  // 토글 버튼 노출 / 숨김 + 배너
  const btn = document.getElementById("debug-toggle");
  const banner = document.getElementById("meta-banner");
  if (!hasDebug) {
    btn.style.display = "none";
    banner.classList.add("hidden");
  } else {
    btn.style.display = "inline-block";
    banner.classList.remove("hidden");
    // 사용자 선호 복원
    let pref = "0";
    try { pref = localStorage.getItem("view-debug") || "0"; } catch (e) {}
    if (pref === "1") toggleDebug();
  }
}

main().catch(e => {
  document.getElementById("content").innerHTML =
    `<div style="color:var(--warn);font-family:var(--mono)">렌더 실패: ${e}</div>`;
});
</script>
</body>
</html>
